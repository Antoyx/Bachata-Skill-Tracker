name: Claude Code Auto-Implement

on:
  issues:
    types: [labeled]

jobs:
  implement:
    if: contains(github.event.issue.labels.*.name, 'ready-to-implement')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            A GitHub issue labeled 'ready-to-implement' needs to be built.
            
            Read the issue carefully, implement the feature following the 
            project's conventions in CLAUDE.md, then open a pull request 
            referencing the issue.
